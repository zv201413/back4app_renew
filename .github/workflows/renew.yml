name: Back4app Auto Redeploy (Node.js Matrix)

on:
  schedule:
    - cron: '0 22 * * *' 
  workflow_dispatch:
    inputs:
      T:
        description: '执行次数 (默认12)'
        required: false
        default: '12'
      start_round:
        description: '起始轮次 (0=自动续接, 1=全新开始, >1=手动指定)'
        required: false
        default: '1'
      batch_size:
        description: '每组包含的账号数 (默认1)'
        required: false
        default: '1'
      batch_delay:
        description: '批次间隔分钟数 (默认30)'
        required: false
        default: '30'

permissions:
  contents: write

env:
  T: ${{ github.event.inputs.T || '12' }}
  START_ROUND: ${{ github.event.inputs.start_round || '1' }}
  BATCH_SIZE: ${{ github.event.inputs.batch_size || '1' }}
  BATCH_DELAY: ${{ github.event.inputs.batch_delay || '30' }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      total_rounds: ${{ steps.set-matrix.outputs.total_rounds }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate batch matrix
        id: set-matrix
        shell: bash
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
          T: ${{ env.T }}
          BATCH_SIZE: ${{ env.BATCH_SIZE }}
        run: |
          # 提取 EML 后缀并按数字排序
          ACCOUNTS=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_")) | sub("EML_";"")' | sort -n)
          
          if [ -z "$ACCOUNTS" ]; then
            HAS_SINGLE=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(. == "EML")')
            if [ -n "$HAS_SINGLE" ]; then
              echo 'matrix=[{"batch":0,"accounts":"SINGLE"}]' >> $GITHUB_OUTPUT
              echo "total_rounds=$T" >> $GITHUB_OUTPUT
              echo "单账号模式 → 1 个批次"
              exit 0
            else
              echo "Error: No EML_1 or EML secrets found."
              exit 1
            fi
          fi
          
          # 将账号列表转为数组
          ACCOUNT_ARRAY=($(echo "$ACCOUNTS"))
          TOTAL=${#ACCOUNT_ARRAY[@]}
          echo "发现 $TOTAL 个账号，BATCH_SIZE=$BATCH_SIZE"
          
          # 按 BATCH_SIZE 分组，生成批次级 matrix
          # 例如 BATCH_SIZE=3, 账号=[1,2,3,4,5] → [{batch:0,accounts:"1,2,3"}, {batch:1,accounts:"4,5"}]
          MATRIX_JSON="["
          batch=0
          for ((i=0; i<TOTAL; i+=BATCH_SIZE)); do
            batch_accounts=""
            for ((j=i; j<i+BATCH_SIZE && j<TOTAL; j++)); do
              if [ -n "$batch_accounts" ]; then batch_accounts+=","; fi
              batch_accounts+="${ACCOUNT_ARRAY[$j]}"
            done
            if [ $batch -gt 0 ]; then MATRIX_JSON+=","; fi
            MATRIX_JSON+="{\"batch\":$batch,\"accounts\":\"$batch_accounts\"}"
            batch=$((batch + 1))
          done
          MATRIX_JSON+="]"
          
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
          echo "total_rounds=$T" >> $GITHUB_OUTPUT
          
          echo "分组结果: $TOTAL 个账号 → $batch 个批次"
          echo "Matrix: $MATRIX_JSON"

  renew:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npx playwright install --with-deps chrome
          sudo apt-get update
          sudo apt-get install -y jq fonts-noto-cjk python3 wget bc

      - name: Start Proxy Tunnel
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then exit 0; fi
          
          SINGBOX_VER="1.11.0"
          echo "下载 sing-box v${SINGBOX_VER}..."
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          
          echo "解析代理协议..."
          python3 proxy_handler.py
          
          if [ -f config.json ]; then
            echo "代理配置已生成"
            nohup ./sing-box run -c config.json > singbox.log 2>&1 &
            sleep 5
            echo "Proxy tunnel started"
          else
            echo "代理配置生成失败"
            exit 1
          fi

      - name: Run Extension Script
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
          ACCOUNTS: ${{ matrix.accounts }}
          BATCH_INDEX: ${{ matrix.batch }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          T: ${{ env.T }}
          START_ROUND: ${{ env.START_ROUND }}
          BATCH_DELAY: ${{ env.BATCH_DELAY }}
        run: node renew.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-batch-${{ matrix.batch }}
          path: "*.png"
          retention-days: 5

      - name: Persist status file
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || echo "No remote changes"
          STATUS_FILE="status_batch_${{ matrix.batch }}.json"
          if [ -f "$STATUS_FILE" ]; then
            git add "$STATUS_FILE"
            git commit -m "chore: Update $STATUS_FILE for batch ${{ matrix.batch }} [skip ci]" || echo "No changes"
            git push
          fi

      - name: Check if need next wave
        id: check-next
        if: always()
        shell: bash
        env:
          T: ${{ env.T }}
        run: |
          STATUS_FILE="status_batch_${{ matrix.batch }}.json"
          if [ -f "$STATUS_FILE" ]; then
            CURRENT=$(jq -r '.currentRound // 1' "$STATUS_FILE")
            if [ "$CURRENT" -le "$T" ]; then
              echo "NEXT_WAVE=true" >> $GITHUB_OUTPUT
              echo "剩余轮次: $CURRENT / $T"
            else
              echo "NEXT_WAVE=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "NEXT_WAVE=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger next wave
        if: always() && steps.check-next.outputs.NEXT_WAVE == 'true' && matrix.batch == 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 60
          echo "Triggering workflow again for remaining rounds..."
          gh workflow run renew.yml -f T="${{ env.T }}" -f batch_size="${{ env.BATCH_SIZE }}" -f batch_delay="${{ env.BATCH_DELAY }}" -f start_round="0"
